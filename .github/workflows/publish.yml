name: Publish

on:
  workflow_dispatch:
    inputs:
      libraryVersion:
        description: "Version to publish (e.g. 1.7.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify version is not already tagged
        run: |
          tag="v${{ inputs.libraryVersion }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists — aborting to avoid publishing a duplicate version."
            exit 1
          fi
      - name: Publish to github packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish -PlibraryVersion="${{ inputs.libraryVersion }}"
      - name: Create tag and GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.libraryVersion }}
          name: v${{ inputs.libraryVersion }}
          generate_release_notes: true
